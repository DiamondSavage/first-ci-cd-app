name: Python Docker CI

on:
  push:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t abdallaahhegazy/flask-app:latest .

      - name: Run Container
        run: docker run -d -p 5000:5000 --name flask abdallaahhegazy/flask-app:latest

      - name: Wait
        run: sleep 5

      - name: Test Application
        run: curl http://localhost:5000

      - name: Login to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_TOKEN }}" | docker login \
            --username "${{ secrets.DOCKER_USERNAME }}" \
            --password-stdin

      - name: Push Docker Image
        run: docker push abdallaahhegazy/flask-app:latest

      - name: Show Running Containers
        run: docker ps
